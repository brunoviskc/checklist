spring.application.name=checklist
# 1. O Endereço do Galpão (URL do Banco MySQL)
# O final "?serverTimezone=UTC" evita problemas de fuso horário que o MySQL às vezes apresenta
spring.datasource.url=jdbc:mysql://localhost:3306/checklist_db?serverTimezone=UTC

# 2. As Credenciais
spring.datasource.username=root
spring.datasource.password=root

# 3. O Mestre de Obras (Hibernate)
# 'update' cria ou atualiza a estrutura das tabelas sem apagar os dados existentes
spring.jpa.hibernate.ddl-auto=update

# 4. O Tradutor (Dialeto do MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 5. Para ver a mágica acontecendo (Mostra os comandos SQL no console)
spring.jpa.show-sql=true